<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USCP Exam 3 Hard Scenario Test</title>
<style>
  body{font-family:Arial, sans-serif;background:#0f1117;color:#f2f2f2;margin:0;padding:20px;}
  .wrap{max-width:1050px;margin:auto;}
  h1{margin-bottom:5px;}
  .note{color:#b8b8b8;margin-bottom:20px;line-height:1.4;}
  .question{background:#1b2130;border:1px solid #343d52;border-radius:10px;padding:18px;margin:18px 0;}
  .question h3{margin-top:0;font-size:17px;line-height:1.45;}
  label{display:block;background:#252d3f;margin:8px 0;padding:10px;border-radius:7px;cursor:pointer;line-height:1.35;}
  label:hover{background:#313b52;}
  button{background:#527cff;color:white;border:none;border-radius:8px;padding:12px 18px;font-size:16px;cursor:pointer;margin:18px 8px 18px 0;}
  .result{font-size:21px;font-weight:bold;margin:18px 0;}
  .explain{display:none;margin-top:12px;padding:11px;border-radius:7px;line-height:1.4;}
  .correct{background:#123d24;color:#a7ffbd;}
  .wrong{background:#4a1d1d;color:#ffb4b4;}
  .key{display:none;background:#151a24;border:1px solid #323a4d;border-radius:10px;padding:15px;margin-top:20px;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
<h1>USCP Exam 3 — Hard Scenario Test</h1>
<p class="note">50 difficult scenario-based questions focused on Traffic, TIMPS, Ethics, permits, registration, NOI procedures, DUI/DWI, emergency vehicle response, and enforcement judgment.</p>
<form id="quiz"></form>
<button type="button" onclick="gradeQuiz()">Submit Test</button>
<button type="button" onclick="showKey()">Show Answer Key</button>
<div id="score" class="result"></div>
<div id="key" class="key"></div>
</div>

<script>
const questions = [
{q:"You stop a vehicle on Independence Avenue for failing to obey a stop sign. The driver produces a valid Virginia license. Dispatch returns the Virginia license as valid and says there is 'No DC Status.' The driver has no warrants. What is the best enforcement decision?",a:["Make a summary arrest because the driver has no DC operating status.","Issue the NOI for the stop sign violation and allow the driver to leave if otherwise lawful.","Issue a No Valid Permit NOI because every driver operating on Capitol Grounds must have DC status.","Impound the vehicle until DMV confirms the driver has driving privileges in DC."],c:1,e:"No DC Status simply means DC has no record. A valid out-of-state license with no DC suspension/revocation does not equal No Valid Permit."},
{q:"During a traffic stop, the driver gives you a Maryland license that expired 78 days ago. The driver states they forgot to renew it. There are no warrants, and the vehicle is legally registered. What is the proper action?",a:["Summary arrest for No Valid Permit because any expired permit is an arrestable offense.","Issue an NOI for the permit violation, advise the driver they cannot legally operate in DC, and ensure a licensed operator or tow removes the vehicle.","Allow the driver to leave because the permit expired less than 90 days ago.","Charge Operating After Suspension because an expired license is treated the same as suspended status."],c:1,e:"Expired 90 days or less is handled by NOI, but the person cannot continue driving."},
{q:"A driver stopped for unsafe lane change produces a Pennsylvania license that expired 112 days ago. Dispatch confirms no warrants and no DC status. What is the correct permit-related action?",a:["Issue a warning because the license is from another jurisdiction.","Issue only the original moving violation because there is no DC status.","Summary arrest for No Valid Permit because the permit is expired more than 90 days.","Issue an NOI for Failure to Exhibit Operator’s Permit."],c:2,e:"A permit expired more than 90 days requires summary arrest for No Valid Permit."},
{q:"A driver shows a valid Maryland license, but dispatch advises the person’s DC driving privilege is suspended. The original violation was a minor equipment violation. What should you do?",a:["Issue the minor equipment NOI only because the Maryland license is valid.","Issue a No Valid Permit NOI and allow the vehicle to be removed by a licensed driver.","Make a summary arrest for Operating After Suspension.","Take no permit action because DC only has authority over DC-issued licenses."],c:2,e:"If the person’s DC status is suspended, it is Operating After Suspension and requires summary arrest."},
{q:"A driver shows a valid Virginia license. Dispatch advises their DC privilege is revoked. The original stop was for running a red signal. Which charge fits best?",a:["No Valid Permit because the out-of-state permit is not recognized.","Operating After Revocation because the person’s DC privilege has been terminated.","Failure to Exhibit Permit because they did not show a DC license.","NOI only because revocation requires a DC-issued permit."],c:1,e:"DC revoked status means Operating After Revocation, even if another license appears valid."},
{q:"A person is behind the wheel of a running vehicle parked along the curb. They say they were only warming up the car and were not driving. Their license is revoked in DC. Which is the strongest answer?",a:["No violation because the vehicle was not moving.","Operating does not begin until the vehicle enters traffic.","They may be considered operating because they are behind the wheel with the engine running and in physical control.","Only a parking violation applies because the vehicle was stationary."],c:2,e:"Operating includes physical control, including sitting behind the wheel with the engine running."},
{q:"A 16-year-old learner’s permit holder is stopped at 2035 hours for failing to stop at a stop sign. A valid licensed driver age 25 is seated beside them. What is the best enforcement choice?",a:["Charge No Valid Permit because the learner is under 18.","Issue the stop sign NOI; the learner permit conditions are otherwise satisfied at that time.","Charge learner permit violation because learners may only drive until 1800 hours.","Make a summary arrest because a learner’s permit is not valid on Capitol Grounds."],c:1,e:"A learner may drive from 0600 to 2100 with a licensed driver at least 21 seated beside them."},
{q:"A 17-year-old learner’s permit holder is stopped at 2145 hours after a lane violation. A licensed parent is seated next to them. No emergency, school, work, or religious exception applies. What is most accurate?",a:["The learner permit time restriction is violated, but that does not automatically become No Valid Permit.","No violation exists because a parent is present.","Summary arrest for No Valid Permit is required.","Only the lane violation may be charged because learner restrictions are not enforceable."],c:0,e:"Learner restrictions can be violated without making it a No Valid Permit summary arrest."},
{q:"You stop a driver who has a valid license but does not physically have it with them. They provide name, DOB, and other identifying information by word of mouth. Dispatch confirms the license is valid. What is the correct permit charge?",a:["No Valid Permit, summary arrest.","Operating After Suspension.","Failure to Exhibit Operator’s Permit, NOI enforceable.","No charge because dispatch confirmed validity."],c:2,e:"A licensed operator must have the permit in immediate possession and exhibit it on demand."},
{q:"A DC vehicle has current registration on file, but the current registration sticker is not displayed on the windshield or tags. The driver has the registration card. What is the best charge?",a:["Operating an Unregistered Vehicle.","Failure to Display Current Tags.","Dead Tags.","Spurious Tags."],c:1,e:"Current registration not displayed is Failure to Display Current Tags."},
{q:"You stop a vehicle with handmade paper tags that appear altered to look like temporary tags. The driver says the real tags were lost. Which charge best matches the tag issue?",a:["Dead Tags.","Spurious Tags.","Failure to Exhibit Registration.","Failure to Display Current Tags."],c:1,e:"Spurious tags are handmade or altered tags made to resemble valid issued tags."},
{q:"A driver bought a vehicle from a neighbor two months ago. The vehicle still displays the neighbor’s valid tags, but the title has changed to the driver. The vehicle has not been registered to the new owner. What is the best tag-related charge?",a:["Dead Tags.","Spurious Tags.","Failure to Display Current Tags.","No Valid Permit."],c:0,e:"Dead tags involve failure to register after title has changed to the new owner."},
{q:"You stop a vehicle with registration expired 45 days. Records show the vehicle was previously registered to the same owner and there is no indication of false statements or fraudulent tags. What is the best general approach?",a:["Summary arrest for Operating Unregistered Vehicle.","NOI for the registration violation and handle removal appropriately if required.","No enforcement because it was previously registered.","Charge Spurious Tags because expired registration makes the tags false."],c:1,e:"Expired or unregistered status alone is generally NOI; arrest requires specific false/fraudulent circumstances."},
{q:"During a stop, a driver has no registration card in the vehicle. The tag return shows the vehicle is currently registered. What is the best charge?",a:["Failure to Exhibit Registration.","Operating Unregistered Vehicle.","Dead Tags.","Spurious Tags."],c:0,e:"Failure to have the current registration card upon demand is Failure to Exhibit Registration."},
{q:"You inspect a vehicle at night and find it has no operable headlights. The driver says they will use hazard lights and drive slowly. What is the best action?",a:["Issue only a warning because the driver knows about the defect.","Issue an NOI for the unsafe condition and remove the vehicle from the roadway by tow or lawful means.","Allow the vehicle to proceed if it is only traveling a short distance.","Charge Spurious Tags because equipment violations make registration invalid."],c:1,e:"A vehicle that is a danger to the public should not be allowed to continue operating."},
{q:"You observe one brake light out during daylight. The vehicle otherwise appears safe and is legally registered. What is the best enforcement action?",a:["Tow the vehicle as unsafe.","Issue an NOI or warning for the specific equipment violation and allow the vehicle to proceed if safe.","Make a summary arrest for operating an unsafe vehicle.","Impound the vehicle until repaired."],c:1,e:"Minor equipment violations do not automatically make the vehicle unsafe for roadway removal."},
{q:"A VIN plate includes the characters I, O, and Q. The driver says the vehicle is older but registered. What should that information suggest?",a:["The VIN is normal because all letters may be used.","The VIN may be incorrect, misread, altered, or otherwise suspicious because those letters are not used.","The vehicle must be a commercial vehicle.","The vehicle must be from another country and cannot be inspected."],c:1,e:"VINs do not use I, O, or Q."},
{q:"You are verifying registration by VIN. Which information should be provided with the VIN to dispatch?",a:["Only the VIN, because the VIN contains all needed vehicle information.","VIN plus make, model, year, type, and color.","VIN plus driver’s SSN and insurance company.","Tag number only because VIN checks are not used for registration verification."],c:1,e:"The officer should give VIN and vehicle description such as make, model, year, type, and color."},
{q:"A driver is stopped for texting while driving. They argue they were only reading an incoming message and had not typed anything. What is most accurate?",a:["Reading a text-based message is included in texting.","Only composing or sending a message qualifies.","Reading is legal if the vehicle is moving slowly.","It is legal if the phone is below the dashboard."],c:0,e:"Texting includes composing, sending, receiving, or reading text-based messages."},
{q:"A school bus driver is stopped while using a hands-free phone system. No passengers are on board. Which answer best applies?",a:["No violation because hands-free devices are generally allowed.","Violation because school bus drivers may not use even hands-free devices.","No violation unless passengers are present.","Only a warning is allowed because no collision occurred."],c:1,e:"School bus drivers may not use even hands-free devices."},
{q:"A learner’s permit holder is using a hands-free phone while driving properly with an adult instructor. What is correct?",a:["Allowed because the device is hands-free.","Violation because learner permit operators may not use even hands-free devices.","Allowed if the call is less than one minute.","Only prohibited if texting."],c:1,e:"Learner’s permit operators may not use even hands-free devices."},
{q:"You observe a driver holding a phone to call 911 about a crash they just witnessed. Which is the best enforcement choice?",a:["Cite for handheld mobile phone use.","No mobile phone violation applies for emergency calls to 911/311 or emergency services.","Cite only if the call lasts more than 30 seconds.","Cite for distracted driving automatically because any phone use is prohibited."],c:1,e:"Emergency calls are an exception."},
{q:"A driver refuses to stop after you activate emergency lights and siren. They continue for two blocks, then stop. They did not drive recklessly, damage property, or injure anyone. Best classification?",a:["Felony fleeing.","Misdemeanor fleeing.","No fleeing because they eventually stopped.","Only an NOI for failure to obey traffic control device."],c:1,e:"Knowingly failing or refusing to stop is misdemeanor fleeing unless aggravating factors elevate it."},
{q:"A driver refuses to stop and drives into opposing lanes at high speed, nearly striking pedestrians. What is the best fleeing classification?",a:["Misdemeanor fleeing only.","Felony fleeing because the driving constitutes reckless driving / danger.","Only reckless driving, no fleeing.","No charge unless a collision occurs."],c:1,e:"Fleeing plus reckless driving, injury, or property damage elevates to felony."},
{q:"A driver is involved in a taxi fare dispute. The passenger says the fare is unfair but has not refused to pay after demand in your presence. What is the best initial understanding?",a:["The matter is immediately Theft II.","Fare disputes are civil unless refusal to pay occurs after demand.","The driver must be arrested if the passenger complains.","The passenger must be arrested for disorderly conduct."],c:1,e:"Fare disputes are civil until refusal after demand supports Theft II."},
{q:"A taxicab operator asks a potential passenger where they are going before the passenger gets into the cab. The operator then refuses the ride because the destination is inconvenient. What is most accurate?",a:["This is allowed because the operator may ask destination first.","Improper; the destination cannot be asked until the passenger is in the taxicab.","Allowed only if the cab is close to the end of the shift.","Allowed if the passenger has luggage."],c:1,e:"Operators cannot ask destination until the passenger is inside."},
{q:"A taxicab operator refuses service because the passenger appears to be actively engaged in a violation of law. Which is correct?",a:["The refusal is never permitted.","The operator may refuse service under that circumstance.","The operator must call a supervisor before refusing.","The refusal is only permitted after 1800 hours."],c:1,e:"Taxi operators may refuse service if the passenger is believed to be engaged in a violation of law."},
{q:"You are initiating an unknown-risk traffic stop at night. Which sequence best reflects proper radio information after acknowledgement?",a:["Driver name, violation, tag, weather, number of officers.","Location, tag, color/make/model, number of occupants, and whether solo or with another unit.","Tag, VIN, driver’s license, insurance, and phone number.","Location only until backup arrives."],c:1,e:"The traffic stop radio order includes location, tag, vehicle description, occupants, and solo/with another unit."},
{q:"During an unknown-risk stop, you approach the vehicle. Which action is most consistent with proper officer safety?",a:["Stand even with the driver’s window with your body exposed for clear communication.","Stay close to the side of the vehicle and do not position yourself past the rear of the front door.","Walk directly behind the suspect vehicle to avoid being seen.","Ask the driver to sit in your scout while you complete the NOI."],c:1,e:"Approach close to the vehicle and avoid going past the rear of the front door."},
{q:"A driver refuses to sign an NOI, stating, 'I’m not admitting guilt.' What is the correct response?",a:["Void the NOI because refusal invalidates it.","Explain signature is not admission, write REFUSED if they still refuse, date it, and give Copy C.","Arrest the driver for refusing to sign.","Keep the violator’s copy and submit all copies to the supervisor."],c:1,e:"Refusal does not void the NOI; write REFUSED, date, and provide the violator copy."},
{q:"You issue an NOI and later, after leaving the scene, realize you wrote the wrong violation code. What should you do?",a:["Destroy the NOI and write a corrected one later.","Notify your immediate supervisor and complete CP-320 Request for Cancellation.","Do nothing because the violator already has the copy.","Write VOID diagonally across your copy only."],c:1,e:"An NOI written in error discovered after leaving the scene requires supervisor notification and CP-320."},
{q:"You accidentally spoil an NOI set before issuing it. What is proper?",a:["Throw it away so it is not processed.","Void the set and turn it in with a completed CP-564.","Keep it in the book until the end of the month.","Use correction fluid and continue using it."],c:1,e:"Spoiled/defaced NOI sets are voided and turned in with CP-564."},
{q:"A parked vehicle is unoccupied and you issue a parking NOI. Where should the violator’s copy be placed?",a:["Under the driver-side windshield wiper, pink side up.","Under the passenger-side windshield wiper, white side up.","On the rear tag.","Inside the fuel door."],c:0,e:"If operator is not present, place the NOI under the driver-side windshield wiper, pink side up."},
{q:"During Code 1 response, you approach an intersection controlled by a red traffic signal. Which action best matches policy?",a:["Proceed through if lights and siren are activated.","Slow slightly and continue if traffic appears stopped.","Slow before entering, stop if necessary, and proceed only when safe.","Turn off siren to avoid confusing pedestrians."],c:2,e:"Code 1 does not remove the duty to drive with due regard."},
{q:"You are authorized Code 1 to an emergency call. A vehicle involved in a misdemeanor traffic offense flees from another unit. What is correct?",a:["Code 1 authorization automatically allows you to join the pursuit.","Vehicle pursuit is not authorized merely because Code 1 is authorized.","You may pursue any vehicle that flees from police.","You may pursue if the vehicle is inside the Extended Jurisdiction Zone."],c:1,e:"Code 1 authorization alone does not authorize a vehicle pursuit."},
{q:"A vehicle is wanted for a non-violent property felony and flees. No immediate threat of death or serious injury is known. Under USCP pursuit policy, what is the best decision?",a:["Pursue because any felony permits pursuit.","Do not engage in vehicular pursuit because policy limits pursuit to violent felony circumstances with immediate danger.","Pursue only until the vehicle leaves Capitol Grounds.","Pursue if your vehicle has lights and siren."],c:1,e:"Vehicle pursuit is limited to violent felony / serious threat circumstances."},
{q:"During a vehicle pursuit, you approach a four-way pedestrian walk signal. What should you do?",a:["Proceed if no pedestrians are visible.","Stop before entering the intersection.","Slow to the maximum legal speed and continue.","Use the opposing lane to bypass the intersection."],c:1,e:"Policy requires stopping before entering intersections with four-way pedestrian walk signals."},
{q:"During pursuit, a supervisor orders termination. You still see the suspect vehicle and believe you can catch it. What is required?",a:["Continue until the suspect is lost.","Terminate the pursuit as directed.","Continue only if you are the primary unit.","Switch siren tone and continue at lower speed."],c:1,e:"A pursuit must terminate when directed by a supervisor."},
{q:"Which pursuit tactic is prohibited by policy?",a:["Activating all emergency devices.","Providing location updates to Communications.","Boxing in a moving pursued vehicle.","Traveling in the left lane and passing left when possible."],c:2,e:"Boxing in, ramming, PIT, stop sticks, roadblocks, and deliberate contact are prohibited."},
{q:"You are working TIMPS when a heavily weighted-down commercial-style van approaches a checkpoint. You cannot see inside, and it appears oversized. The driver has not yet violated any traffic signal. How should it be viewed?",a:["As an authorized vehicle unless it crosses the checkpoint line.","As a Vehicle of Interest that may be stopped, investigated, and/or diverted.","As Condition Red automatically because all vans are threats.","As a public transit vehicle if it has passengers."],c:1,e:"A vehicle that is heavily weighted, oversized, or cannot be seen into may be a Vehicle of Interest."},
{q:"A charter bus approaches a TIMP checkpoint and requests to enter Capitol Grounds to drop passengers wherever they want. Which is correct?",a:["All charter buses are authorized if carrying passengers.","Unauthorized buses may off-load/re-load only at designated locations such as Garfield Circle, Peace Circle, or Unit Block of First Street NW/SW between the circles.","Charter buses must be searched and then allowed anywhere on Capitol Grounds.","The bus is automatically a breach if it approaches the checkpoint."],c:1,e:"Unauthorized buses have specific allowed loading/unloading locations."},
{q:"A contracted public transit bus approaches TIMPS with a route number displayed and an MTA magnet on the side. What is the best action?",a:["Treat it as unauthorized and divert immediately.","Treat it as authorized, but it is still required to stop and speak with TIMP personnel before entering.","Treat it as a Vehicle of Interest automatically.","Deploy barriers because public transit cannot enter."],c:1,e:"Contracted public transit buses are authorized but must stop and speak with TIMP personnel."},
{q:"A TIMP officer requests consent for an administrative search of a vehicle of interest. The driver refuses. What is the proper response?",a:["Search anyway because TIMP checkpoints are administrative.","Divert the vehicle following any other appropriate police action and relay description/tag to other checkpoints.","Arrest for refusal to consent.","Raise all barriers and treat it as Condition Red."],c:1,e:"If the driver does not consent, the vehicle is diverted and information relayed."},
{q:"At a TIMP checkpoint, an Unauthorized Vehicle enters the Signal Activation Zone. What condition is this most consistent with?",a:["Condition Green.","Condition Blue.","Condition Red.","Breach."],c:1,e:"Condition Blue occurs when an Unauthorized Vehicle or Vehicle of Interest enters the Signal Activation Zone."},
{q:"At TIMPS, a perceived threat vehicle enters the Restricted Streets. Traffic is stopped and clear, and barricades are raised individually. Which condition is this?",a:["Condition Blue.","Condition Yellow.","Unauthorized Access.","Condition Green."],c:1,e:"Condition Yellow involves a perceived threat entering restricted streets and individual barricade deployment."},
{q:"A vehicle accelerates toward the restricted area, crosses into oncoming lanes, ignores officers, and displays malicious intent. What TIMP condition is most appropriate?",a:["Condition Blue.","Condition Yellow.","Condition Red.","Unauthorized Access only."],c:2,e:"Condition Red applies when a vehicle attempts entry with malicious intent such as evasion, crossing into oncoming lanes, ramming, or visible weapons."},
{q:"A vehicle runs a red light near a TIMP checkpoint but shows no other threat indicators. What is the best statement?",a:["Running the red signal alone justifies barrier deployment.","A red-light violation alone does not by itself justify barrier deployment; totality of circumstances matters.","It is automatically a breach.","It must be ignored because TIMP officers cannot enforce traffic law."],c:1,e:"Running a red light alone does not justify Condition Red barrier deployment."},
{q:"A vehicle accidentally passes the wrong point at a checkpoint because the driver misunderstood the officer’s hand signal. It is quickly pushed out of the perimeter. Which term best fits?",a:["Breach.","Unauthorized Access.","Condition Red.","Vehicle ramming."],c:1,e:"Unauthorized Access is generally error-based by driver, officer, or both."},
{q:"A vehicle intentionally bypasses officers in an overt manner and enters the restricted area. What is the best classification?",a:["Unauthorized Access only.","Breach.","Routine traffic violation.","Condition Green."],c:1,e:"A breach is an intentional overt bypass and is treated as high-risk."},
{q:"A non-AMR private ambulance attempts to traverse the Hill with emergency lights operating but without proper authorization. What is correct?",a:["It is allowed because emergency lights are activated.","It is not allowed to traverse the Hill simply because lights are activated.","It becomes authorized if it is transporting a patient.","It must be treated as a public transit bus."],c:1,e:"Other emergency vehicle contract companies are not allowed to traverse through the Hill, emergency lights or not."},
{q:"A driver of a large construction vehicle tells you they have business near a Capitol building. Under TIMPS, what is the strongest answer?",a:["Business purpose alone allows entry without screening.","Certain business/official-function exceptions may exist, but the vehicle must be screened before entering Capitol Grounds.","All construction vehicles are always banned without exception.","The driver’s statement alone is enough to permit entry."],c:1,e:"Authorized exceptions must still be screened before entering."},
{q:"A USCP employee is offered free sports tickets by a vendor who regularly seeks Department business. The employee says they will accept because no official decision is pending that day. What is the best ethics concern?",a:["There is no issue if the tickets are accepted off duty.","The offer may be a gift and create a conflict between private benefit and official responsibilities.","It is only unethical if the employee attends in uniform.","It is allowed if the employee promises not to discuss work."],c:1,e:"A gift can include entertainment and may create conflict-of-interest concerns."},
{q:"An employee uses their official position to obtain a discount from a private company that would not be available to the public. What is the main ethics problem?",a:["No problem if the discount is small.","Misuse of official position / improper private benefit.","Only a problem if money is exchanged in cash.","Only a problem for sworn employees, not civilian employees."],c:1,e:"Ethics rules concern private benefit connected to official position."},
{q:"A recruit says ethics are only Department rules and have nothing to do with personal morals or values. Which is the best correction?",a:["Correct; ethics exist only in written policy.","Ethics are a framework of moral principles that guide behavior and decision-making, influenced by laws, workplace codes, and moral values.","Incorrect only because ethics apply only off duty.","Correct for sworn officers but not civilian employees."],c:1,e:"Ethics are broader than policy and relate to moral principles, laws, workplace rules, and values."},
{q:"A USCP employee has a private financial relationship with a company seeking a contract involving the Department. The employee participates in official recommendations affecting that company. What concept is most directly involved?",a:["Honorarium.","Conflict of Interest.","Cultural Diversity.","No immunity."],c:1,e:"A conflict of interest is a conflict between private interests and official responsibilities."},
{q:"An employee is offered payment to give a speech related to their official duties. The payment is best described as:",a:["Honorarium.","Collateral fine.","NOI fee.","Administrative search."],c:0,e:"An honorarium is payment for a speech, appearance, or article."},
{q:"A supervisor jokes that accepting meals from a vendor is fine because meals are not 'real gifts.' What is the best response?",a:["Correct; gifts only include cash.","Incorrect; gifts can include meals, lodging, transportation, services, training, discounts, and entertainment.","Correct if the meal is under one hour.","Incorrect only if the meal occurs on Capitol Grounds."],c:1,e:"Gift definitions are broad and include meals and other items of monetary value."},
{q:"A Member of Congress commits a criminal offense on Capitol Grounds. Which statement is most accurate?",a:["They have special immunity and cannot be arrested.","They have no immunity from arrest in criminal matters.","They may only receive an NOI.","They can only be detained if Congress is not in session."],c:1,e:"Members have no immunity from arrest for criminal matters."},
{q:"A Member’s vehicle displays Congressional registration tags and is used on official business. It is parked in an available curb space, but the location is a firehouse zone. What is correct?",a:["The vehicle is allowed because Congressional tags override all restrictions.","The vehicle is not protected because the exception does not allow parking in firehouse zones.","Only a warning may be issued.","The vehicle may park there if the Member is voting."],c:1,e:"Congressional parking privilege does not apply to loading zones, rush hour, or firehouse restrictions."},
{q:"A pedestrian stopped for an NOI-level infraction refuses to produce physical identification but provides true name and address verbally. What is correct?",a:["Arrest because pedestrians must carry ID in DC.","The pedestrian may be required to provide true name/address for the NOI but does not have to possess or display documentary ID.","No enforcement may occur without physical ID.","The officer must release them because pedestrians cannot be identified verbally."],c:1,e:"No general ID requirement exists; for infractions, true name and address may be required."},
{q:"A pedestrian suddenly steps off the curb directly into the path of a vehicle that is too close to yield. Which statement best applies?",a:["The pedestrian has absolute right of way in every crosswalk situation.","The pedestrian violates the rule against suddenly leaving a place of safety into the path of a vehicle too close to yield.","Only the driver can be cited.","No violation exists unless a collision occurs."],c:1,e:"Pedestrians cannot suddenly leave a curb or safety area into the path of a vehicle too close to yield."},
{q:"A group of 29 demonstrators arrives without a permit and uses an available demonstration area. No larger-group breakup issue exists. What is most accurate?",a:["A permit is mandatory for any demonstration activity.","No permit is required for groups under 31, although permits are encouraged and permit holders get priority.","They must leave after one hour.","They must be arrested for demonstration activity."],c:1,e:"Groups under 31 do not require permits, but restrictions still apply."},
{q:"A demonstration group of 45 submits a permit application two days before the event. Which issue is most relevant?",a:["Groups of 31 or more require permit applications at least 5 days in advance.","Groups over 31 never need permits.","The application is automatically approved immediately.","Only groups over 100 need permits."],c:0,e:"Permit applications for groups of 31 or more must be received at least 5 days in advance."}
];

const form = document.getElementById("quiz");
questions.forEach((item, i) => {
  const div = document.createElement("div");
  div.className = "question";
  div.innerHTML = `<h3>${i+1}. ${item.q}</h3>`;
  item.a.forEach((choice, j) => {
    div.innerHTML += `<label><input type="radio" name="q${i}" value="${j}"> ${String.fromCharCode(65+j)}. ${choice}</label>`;
  });
  div.innerHTML += `<div id="exp${i}" class="explain"></div>`;
  form.appendChild(div);
});

function gradeQuiz(){
  let score = 0;
  questions.forEach((item, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    const exp = document.getElementById(`exp${i}`);
    exp.style.display = "block";
    if(selected && Number(selected.value) === item.c){
      score++;
      exp.className = "explain correct";
      exp.innerHTML = `Correct. ${item.e}`;
    } else {
      exp.className = "explain wrong";
      exp.innerHTML = `Incorrect. Correct answer: ${String.fromCharCode(65+item.c)}. ${item.a[item.c]}<br>${item.e}`;
    }
  });
  const pct = Math.round((score / questions.length) * 100);
  document.getElementById("score").innerHTML = `Score: ${score}/${questions.length} (${pct}%)`;
  window.scrollTo({top:0, behavior:"smooth"});
}

function showKey(){
  const key = document.getElementById("key");
  key.style.display = "block";
  key.innerHTML = "<h2>Answer Key</h2>" + questions.map((q,i)=>`${i+1}. ${String.fromCharCode(65+q.c)} — ${q.a[q.c]}`).join("<br>");
}
</script>
</body>
</html>
